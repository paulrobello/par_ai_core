# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

# Same as Black.
line-length = 120
indent-width = 4

# Assume Python 3.11 (matches requires-python >= 3.11)
target-version = "py311"

[lint]
# Enable Pyflakes (`F`), pycodestyle (`E`/`W`), isort (`I`), pyupgrade (`UP`),
# and bugbear (`B`). The pyupgrade/bugbear rules catch real bugs (mutable
# default args, dead version checks, zip-without-strict, etc.) given the py311
# floor (QA-020).
#
# `C901` (McCabe complexity) is intentionally NOT enabled: the codebase has many
# long-but-linear functions (e.g. fetch_url_selenium=30, html_to_markdown=21)
# that would all fire at once, and reducing their complexity is a dedicated
# refactor outside this audit's risk envelope. Revisit per-function when those
# modules are touched.
select = ["E4", "E5", "E7", "E9", "F", "W", "I", "UP", "B"]
ignore = ["E501"]

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

pydocstyle.convention = "google"


[format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

# Enable auto-formatting of code examples in docstrings. Markdown,
# reStructuredText code/literal blocks and doctests are all supported.
#
# This is currently disabled by default, but it is planned for this
# to be opt-out in the future.
docstring-code-format = true

# Set the line length limit used when formatting code snippets in
# docstrings.
#
# This only has an effect when the `docstring-code-format` setting is
# enabled.
docstring-code-line-length = "dynamic"

[lint.isort]
combine-as-imports = true

[lint.per-file-ignores]
# (The Python 3.10 compatibility shims that needed UP036 ignores in
# time_display.py / utils.py were removed once the py311 floor landed (QA-019);
# no per-file rule exceptions remain.)
